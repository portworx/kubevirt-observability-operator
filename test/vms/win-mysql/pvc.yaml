apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: win-mssql-boot-pxe-raw-template-winrm0
  namespace: openshift-virtualization-os-images
  labels:
    app: containerized-data-importer
  annotations:
    cdi.kubevirt.io/storage.import.endpoint: http://kubevirt-registry-528.pwx.kubevirt-observability.com/new_images/windows-golden-cloudinit-working.qcow2
    pvc.source: "cloned"
spec:
  volumeMode: Block
  storageClassName: raw-vol-sc
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
---

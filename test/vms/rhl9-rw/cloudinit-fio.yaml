#cloud-config
# ------------------------------------------------------------------
# 0.  Basic console access
# ------------------------------------------------------------------
chpasswd:
  list: |
    ubuntu:ubuntu
  expire: False
ssh_pwauth: true

# ------------------------------------------------------------------
# 1.  Files we need on the guest
# ------------------------------------------------------------------
write_files:
  # Keep SSH password login enabled so you can check the VM easily
  - path: /etc/ssh/sshd_config.d/99-custom.conf
    owner: root:root
    permissions: '0644'
    content: |
      PasswordAuthentication yes

# ------------------------------------------------------------------
# 2.  Commands that run **every boot** (bootcmd is early in boot)
# ------------------------------------------------------------------
bootcmd:
  # 2-a  Prepare a working directory for scripts & job files
  - mkdir -p /opt/fio_scripts/fiojob
  - cd /opt/fio_scripts

  # 2-b  Pull the latest runner and its .job files from your HTTP repo
  - |
    base="http://kubevirt-registry-528.pwx.kubevirt-observability.com/new_images/fio_scripts"
    curl -fsSL ${base}/random_readwrite_job.sh          -o random_readwrite_job.sh
    curl -fsSL ${base}/fiojob/fio_random_readwrite.job  -o fiojob/fio_random_readwrite.job
    curl -fsSL ${base}/fiojob/fio_random_read.job       -o fiojob/fio_random_read.job
    # ⇢ add more curl lines here if you introduce new .job files later

  # 2-c  Make the runner executable
  - chmod 0755 /opt/fio_scripts/random_readwrite_job.sh

  # 2-d  Launch it in the background and log output for troubleshooting
  - |
    ( cd /opt/fio_scripts && \
      ./random_readwrite_job.sh > /var/log/random_readwrite_job.log 2>&1 & )

# ------------------------------------------------------------------
# 3.  Late-boot tasks (runs once per boot after everything else)
# ------------------------------------------------------------------
runcmd:
  - systemctl restart sshd

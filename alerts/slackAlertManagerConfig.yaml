apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-user-workload
  namespace: openshift-user-workload-monitoring
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: slack-kubevirt-observability
      group_by:
        - alertname
        - namespace
        - kubernetes_namespace_name
        - vm_name
        - severity
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h

    receivers:
      - name: slack-kubevirt-observability
        slack_configs:
          - api_url: '<SLACK_WEBHOOK_URL>'
            send_resolved: true
            title: >-
              [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}
              {{- if .CommonLabels.vm_name }} / {{ .CommonLabels.vm_name }}{{ end }}
            text: >-
              {{ range .Alerts }}
              *Severity:* {{ .Labels.severity }}
              *VM:* {{ if .Labels.vm_name }}{{ .Labels.vm_name }}{{ else }}unknown{{ end }}
              *Namespace:* {{ if .Labels.namespace }}{{ .Labels.namespace }}{{ else }}{{ .Labels.kubernetes_namespace_name }}{{ end }}
              *OS:* {{ if .Labels.os }}{{ .Labels.os }}{{ else }}unknown{{ end }}

              *Summary:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}

              {{ if .Annotations.impact }}*Impact:* {{ .Annotations.impact }}{{ end }}
              {{ if .Annotations.action }}*Action:* {{ .Annotations.action }}{{ end }}
              {{ if .Annotations.runbook_url }}*Runbook:* {{ .Annotations.runbook_url }}{{ end }}

              *Started:* {{ .StartsAt }}
              {{ if eq .Status "resolved" }}*Resolved:* {{ .EndsAt }}{{ end }}
              ---
              {{ end }}
